name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Google Maps API Key
        run: |
          if [ -z "${{ secrets.GMAPS_API_KEY }}" ]; then
            echo 'window.GMAPS_API_KEY = "YOUR_API_KEY_HERE";' > config.js
            echo "::warning::GMAPS_API_KEY secret not set — map will not load until you add it."
          else
            echo "window.GMAPS_API_KEY = \"${{ secrets.GMAPS_API_KEY }}\";" > config.js
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
