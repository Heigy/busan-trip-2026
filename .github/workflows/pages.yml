name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject My Maps URLs (optional secrets)
        env:
          BUSAN_EMBED: ${{ secrets.MYMAPS_BUSAN_EMBED }}
          BUSAN_VIEW: ${{ secrets.MYMAPS_BUSAN_VIEW }}
          JEJU_EMBED: ${{ secrets.MYMAPS_JEJU_EMBED }}
          JEJU_VIEW: ${{ secrets.MYMAPS_JEJU_VIEW }}
        run: |
          if [ -n "$BUSAN_EMBED" ] && [ -n "$JEJU_EMBED" ]; then
            cat > config.js << EOF
          window.MYMAPS_CONFIG = {
            busan: {
              embedUrl: "$BUSAN_EMBED",
              viewUrl: "${BUSAN_VIEW:-$BUSAN_EMBED}",
            },
            jeju: {
              embedUrl: "$JEJU_EMBED",
              viewUrl: "${JEJU_VIEW:-$JEJU_EMBED}",
            },
          };
          EOF
            echo "config.js generated from GitHub Secrets."
          else
            echo "Using committed config.js (set MYMAPS_* secrets to override)."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
